# Deploy Keycloak to DigitalOcean (dev)
# GitHub bootstrap: org DO_DEPLOY_SSH_KEY + vars via Infisical sync + Terraform (enable_github_org_bootstrap).
# App + deploy config: Infisical avcd-infra project, folder /keycloak (Terraform-managed).

name: Deploy Keycloak to DigitalOcean (dev)

on:
  push:
    branches: [main]
    paths:
      - "config/**"
      - "deploy/**"
      - "docker-compose.yml"
      - "Makefile"
      - "scripts/**"
      - "tests/test_production_compose.sh"
      - "tests/test_deploy_workflow.sh"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: deploy-keycloak-do-dev
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production compose
        run: |
          chmod +x tests/*.sh scripts/*.sh
          ./tests/test_production_compose.sh
          ./tests/test_deploy_workflow.sh

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical
          infisical --version

      - name: Fetch secrets from Infisical
        env:
          INFISICAL_API_URL: ${{ vars.INFISICAL_API_URL || 'https://secrets.dev.avcd.ai/api' }}
          INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID || '802aad98-56e1-4b3e-a0a9-68b3bfec4537' }}
          INFISICAL_SECRET_PATH: ${{ vars.INFISICAL_SECRET_PATH || '/keycloak' }}
          INFISICAL_OIDC_IDENTITY_ID: ${{ vars.INFISICAL_OIDC_IDENTITY_ID }}
          INFISICAL_OIDC_AUDIENCE: ${{ vars.INFISICAL_OIDC_AUDIENCE || 'https://github.com/Avocado-Technology' }}
        run: |
          set -euo pipefail
          [ -n "${INFISICAL_OIDC_IDENTITY_ID:-}" ] || { echo "::error::Set INFISICAL_OIDC_IDENTITY_ID on environment development"; exit 1; }
          OIDC_JWT=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${INFISICAL_OIDC_AUDIENCE}" | jq -r .value)
          if [ -z "${OIDC_JWT:-}" ] || [ "$OIDC_JWT" = "null" ]; then
            echo "::error::Failed to obtain GitHub OIDC token (check id-token: write and audience ${INFISICAL_OIDC_AUDIENCE})"
            exit 1
          fi
          export INFISICAL_TOKEN=$(infisical login --method=oidc-auth \
            --machine-identity-id="$INFISICAL_OIDC_IDENTITY_ID" \
            --oidc-jwt="$OIDC_JWT" \
            --domain="${INFISICAL_API_URL%/api}" --silent --plain)
          infisical export --env=dev --path="${INFISICAL_SECRET_PATH}" \
            --projectId="$INFISICAL_PROJECT_ID" --token="$INFISICAL_TOKEN" \
            --format=dotenv --domain="${INFISICAL_API_URL%/api}" --silent \
            > .env.infisical
          test -s .env.infisical || (echo "::error::Infisical export empty (infra project, path ${INFISICAL_SECRET_PATH}, env dev)" && exit 1)
          set -a
          source .env.infisical
          set +a
          for key in KC_DB_URL KC_DB_USERNAME KC_DB_PASSWORD KEYCLOAK_ADMIN_PASSWORD KEYCLOAK_HOST DO_DEPLOY_HOST DO_DEPLOY_USER DO_DEPLOY_PATH KEYCLOAK_POSTGRES_BOOTSTRAP_URI GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET; do
            eval "val=\${$key:-}"
            if [ -z "$val" ]; then
              echo "::error::Missing $key in Infisical (infra project ${INFISICAL_SECRET_PATH}, env dev)"
              exit 1
            fi
            echo "::add-mask::$val"
          done
          echo "✓ Infisical export ready"

      - name: Copy .env.infisical to deploy directory
        run: cp .env.infisical deploy/production/.env.infisical

      - name: Resolve deploy config from Infisical
        id: deploy
        run: |
          set -euo pipefail
          set -a
          source .env.infisical
          set +a
          echo "host=${KEYCLOAK_HOST}" >> "$GITHUB_OUTPUT"
          echo "discovery_url=https://${KEYCLOAK_HOST}/realms/avcd/.well-known/openid-configuration" >> "$GITHUB_OUTPUT"
          echo "deploy_host=${DO_DEPLOY_HOST}" >> "$GITHUB_OUTPUT"
          echo "deploy_user=${DO_DEPLOY_USER:-deploy}" >> "$GITHUB_OUTPUT"
          echo "deploy_path=${DO_DEPLOY_PATH:-/opt/keycloak}" >> "$GITHUB_OUTPUT"

      - name: Ensure Postgres schema permissions (idempotent)
        env:
          SSH_KEY: ${{ secrets.DO_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          set -a
          source .env.infisical
          set +a
          DEPLOY_HOST="${DO_DEPLOY_HOST}"
          DEPLOY_USER="${DO_DEPLOY_USER:-deploy}"
          BOOTSTRAP_URI="${KEYCLOAK_POSTGRES_BOOTSTRAP_URI}"
          [ -n "${SSH_KEY:-}" ] || { echo "::error::DO_DEPLOY_SSH_KEY missing on GitHub environment"; exit 1; }
          install -d -m 700 ~/.ssh
          umask 077
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          BOOTSTRAP_B64=$(printf '%s' "$BOOTSTRAP_URI" | base64 -w0)
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "BOOTSTRAP_B64='$BOOTSTRAP_B64' bash -s" <<'REMOTE'
          set -euo pipefail
          BOOTSTRAP_URI="$(printf '%s' "$BOOTSTRAP_B64" | base64 -d)"
          command -v psql >/dev/null 2>&1 || sudo DEBIAN_FRONTEND=noninteractive apt-get install -y postgresql-client
          run_bootstrap_sql() {
            psql "$BOOTSTRAP_URI" -v ON_ERROR_STOP=1 <<'SQL'
          GRANT ALL ON SCHEMA public TO keycloak;
          ALTER SCHEMA public OWNER TO keycloak;
          GRANT ALL PRIVILEGES ON DATABASE keycloak TO keycloak;
          SQL
          }
          max_attempts=12
          delay_seconds=5
          attempt=1
          while true; do
            err_file="$(mktemp)"
            if run_bootstrap_sql 2>"$err_file"; then
              rm -f "$err_file"
              break
            fi
            err="$(cat "$err_file")"
            rm -f "$err_file"
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "$err" >&2
              exit 1
            fi
            if echo "$err" | grep -qiE 'remaining connection slots|too many clients|too many connections'; then
              echo "Attempt ${attempt}/${max_attempts}: Postgres connection limit hit, retrying in ${delay_seconds}s..." >&2
              sleep "$delay_seconds"
              attempt=$((attempt + 1))
              if [ "$delay_seconds" -lt 60 ]; then
                delay_seconds=$((delay_seconds * 2))
              fi
              continue
            fi
            echo "$err" >&2
            exit 1
          done
          REMOTE
          echo "✓ Postgres schema permissions ensured"

      - name: Deploy Keycloak stack
        uses: Avocado-Technology/avcd-actions/droplet-compose-deploy@v2
        with:
          deploy_host: ${{ steps.deploy.outputs.deploy_host }}
          deploy_user: ${{ steps.deploy.outputs.deploy_user }}
          deploy_path: ${{ steps.deploy.outputs.deploy_path }}
          ssh_key: ${{ secrets.DO_DEPLOY_SSH_KEY }}
          compose_subdirectory: deploy/production
          compose_file: docker-compose.yml
          public_host: ${{ steps.deploy.outputs.host }}
          acme_email: ""
          pass_compose_tls_env: "false"
          clear_published_ports: "none"
          verify_mode: http
          verify_url: ${{ steps.deploy.outputs.discovery_url }}
          verify_body_substring: '"issuer"'
          verify_http_insecure_first: "false"

  apply-keycloak-config:
    needs: deploy
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Trigger avcd-infra Keycloak config apply
        env:
          GH_TOKEN: ${{ secrets.GH_TERRAFORM_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "${GH_TOKEN:-}" ] || { echo "::error::GH_TERRAFORM_TOKEN missing — cannot trigger keycloak-config apply"; exit 1; }
          gh workflow run keycloak-config-apply.yml -R Avocado-Technology/avcd-infra --ref main
          sleep 8
          RUN_ID="$(gh run list -R Avocado-Technology/avcd-infra -w "Keycloak Config Apply" -L 1 --json databaseId -q '.[0].databaseId')"
          echo "Watching avcd-infra run ${RUN_ID}"
          gh run watch "$RUN_ID" -R Avocado-Technology/avcd-infra --exit-status
