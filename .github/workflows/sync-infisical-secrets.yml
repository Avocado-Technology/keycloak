# Sync Keycloak deploy secrets to Infisical /keycloak (reads pulumi-infra stack outputs).
# Run after infra changes or before first Kamal deploy. Not on every commit.

name: Sync Infisical secrets (/keycloak)

on:
  workflow_dispatch:
    inputs:
      pulumi_command:
        description: Pulumi command
        required: false
        default: preview
        type: choice
        options:
          - preview
          - up
          - refresh
  workflow_call:
    inputs:
      pulumi_command:
        description: Pulumi command
        required: false
        type: string
        default: preview

concurrency:
  group: keycloak-sync-infisical
  cancel-in-progress: true

env:
  PULUMI_BACKEND_URL: s3://avcd-infra-tfstate/pulumi?region=us-east-1&endpoint=sfo3.digitaloceanspaces.com
  PULUMI_ORG: organization

permissions:
  contents: read

jobs:
  sync-infisical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache-dependency-path: pulumi/package-lock.json

      - name: Install Pulumi dependencies
        working-directory: pulumi
        run: npm ci

      - uses: ./.github/actions/pulumi-secrets
        with:
          command: ${{ inputs.pulumi_command || github.event.inputs.pulumi_command || 'preview' }}
        env:
          SPACES_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
          SPACES_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
