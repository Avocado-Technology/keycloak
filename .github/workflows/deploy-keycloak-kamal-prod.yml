# Deploy Keycloak via Kamal — single shared IdP on the infra stack (auth.avcd.ai)
#
# Same model as Infisical: one deployment on infra; dev and prod apps consume it by URL
# (https://auth.avcd.ai/realms/avcd). There is no second Keycloak host for "dev".
# Local Docker (make up) is for developer machines only.
#
# Secrets: single Infisical (https://secrets.avcd.ai), avcd-infra project (/keycloak,
# /ci-bootstrap). INFISICAL_ENV=prod is the Infisical slug for infra-host secrets, not
# a separate Keycloak instance.
#
# OIDC: Pulumi keycloak-ci (repo:Avocado-Technology/keycloak:*). GitHub environment
# "production" is for OIDC claim binding only — not an app deploy environment.

name: Deploy Keycloak to DigitalOcean (infra) — Kamal

on:
  push:
    branches: [main]
    paths:
      - "config/**"
      - ".kamal/**"
      - ".github/workflows/deploy-keycloak-kamal-prod.yml"
  workflow_dispatch:
    inputs:
      kamal_command:
        description: Kamal command (deploy or setup for first run)
        required: false
        default: deploy
        type: choice
        options:
          - deploy
          - setup
          - redeploy
      sync_infisical_first:
        description: Run sync-infisical-secrets (pulumi up) before deploy
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-keycloak-kamal-do-prod
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  sync-infisical:
    if: github.event_name == 'workflow_dispatch' && inputs.sync_infisical_first == true
    uses: ./.github/workflows/sync-infisical-secrets.yml
    with:
      pulumi_command: up
    secrets: inherit

  deploy:
    needs: [sync-infisical]
    if: always() && (needs.sync-infisical.result == 'success' || needs.sync-infisical.result == 'skipped')
    runs-on: ubuntu-latest
    # GitHub environment "production" = OIDC claim binding for keycloak-ci only (not a second IdP).
    # Ensure wait_timer is 0: Settings → Environments → production.
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical
          infisical --version

      - name: Fetch secrets from Infisical via OIDC
        id: infisical
        env:
          INFISICAL_API_URL: ${{ vars.INFISICAL_API_URL || 'https://secrets.avcd.ai/api' }}
          INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_INFRA_PROJECT_ID }}
          INFISICAL_SECRET_PATH: ${{ vars.INFISICAL_SECRET_PATH || '/keycloak' }}
          INFISICAL_ENV: ${{ vars.INFISICAL_ENV || 'prod' }}
          INFISICAL_OIDC_IDENTITY_ID: ${{ vars.INFISICAL_OIDC_IDENTITY_ID }}
          INFISICAL_OIDC_AUDIENCE: ${{ vars.INFISICAL_OIDC_AUDIENCE || 'https://secrets.avcd.ai' }}
        run: |
          set -euo pipefail
          [ -n "${INFISICAL_OIDC_IDENTITY_ID:-}" ] || { echo "::error::Set INFISICAL_OIDC_IDENTITY_ID repo variable (or production environment)"; exit 1; }
          [ -n "${INFISICAL_PROJECT_ID:-}" ] || { echo "::error::Set INFISICAL_INFRA_PROJECT_ID repo variable"; exit 1; }

          OIDC_JWT=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${INFISICAL_OIDC_AUDIENCE}" | jq -r .value)
          if [ -z "${OIDC_JWT:-}" ] || [ "$OIDC_JWT" = "null" ]; then
            echo "::error::Failed to obtain GitHub OIDC token"
            exit 1
          fi

          export INFISICAL_TOKEN=$(infisical login --method=oidc-auth \
            --machine-identity-id="$INFISICAL_OIDC_IDENTITY_ID" \
            --oidc-jwt="$OIDC_JWT" \
            --domain="${INFISICAL_API_URL%/api}" --silent --plain)
          echo "::add-mask::${INFISICAL_TOKEN}"

          DOMAIN="${INFISICAL_API_URL%/api}"
          infisical export --env="${INFISICAL_ENV}" --path="${INFISICAL_SECRET_PATH}" \
            --projectId="$INFISICAL_PROJECT_ID" --token="$INFISICAL_TOKEN" \
            --format=dotenv --domain="$DOMAIN" --silent > .env.keycloak

          infisical export --env="${INFISICAL_ENV}" --path="/ci-bootstrap" \
            --projectId="$INFISICAL_PROJECT_ID" --token="$INFISICAL_TOKEN" \
            --format=dotenv --domain="$DOMAIN" --silent > .env.bootstrap

          test -s .env.keycloak || { echo "::error::Infisical /keycloak export empty"; exit 1; }
          test -s .env.bootstrap || { echo "::error::Infisical /ci-bootstrap export empty"; exit 1; }

          set -a
          # shellcheck disable=SC1091
          source .env.keycloak
          source .env.bootstrap
          set +a

          [ -n "${DO_DEPLOY_SSH_KEY:-}" ] || { echo "::error::DO_DEPLOY_SSH_KEY missing in /ci-bootstrap"; exit 1; }

          {
            echo "keycloak_host=${KEYCLOAK_HOST}"
            echo "deploy_host=${DO_DEPLOY_HOST}"
            echo "deploy_user=${DO_DEPLOY_USER:-deploy}"
            echo "postgres_bootstrap_uri=${KEYCLOAK_POSTGRES_BOOTSTRAP_URI:-}"
          } >> "$GITHUB_OUTPUT"

          umask 077
          printf '%s\n' "$DO_DEPLOY_SSH_KEY" > .deploy_ssh_key
          {
            echo 'ssh_key<<EOF'
            cat .deploy_ssh_key
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          install -d -m 700 .kamal
          export INFISICAL_INFRA_PROJECT_ID="$INFISICAL_PROJECT_ID"
          export INFISICAL_SECRETS_PATH="${INFISICAL_SECRET_PATH}"
          export INFISICAL_BOOTSTRAP_PATH="/ci-bootstrap"
          bash .kamal/secrets.ci.template > .kamal/secrets
          chmod 600 .kamal/secrets
          test -s .kamal/secrets

      - name: Ensure Postgres schema permissions (idempotent)
        if: steps.infisical.outputs.postgres_bootstrap_uri != ''
        env:
          SSH_KEY_FILE: .deploy_ssh_key
          BOOTSTRAP_URI: ${{ steps.infisical.outputs.postgres_bootstrap_uri }}
        run: |
          set -euo pipefail
          DEPLOY_HOST="${{ steps.infisical.outputs.deploy_host }}"
          DEPLOY_USER="${{ steps.infisical.outputs.deploy_user }}"
          chmod 600 "$SSH_KEY_FILE"
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          BOOTSTRAP_B64=$(printf '%s' "$BOOTSTRAP_URI" | base64 -w0)
          ssh -i "$SSH_KEY_FILE" -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "BOOTSTRAP_B64='$BOOTSTRAP_B64' bash -s" <<'REMOTE'
          set -euo pipefail
          BOOTSTRAP_URI="$(printf '%s' "$BOOTSTRAP_B64" | base64 -d)"
          command -v psql >/dev/null 2>&1 || sudo DEBIAN_FRONTEND=noninteractive apt-get install -y postgresql-client
          psql "$BOOTSTRAP_URI" -v ON_ERROR_STOP=1 <<'SQL'
          GRANT ALL ON SCHEMA public TO keycloak;
          ALTER SCHEMA public OWNER TO keycloak;
          GRANT ALL PRIVILEGES ON DATABASE keycloak TO keycloak;
          SQL
          REMOTE
          echo "✓ Postgres schema permissions ensured"

      # Pin avcd-actions (2e0e1b5+ has localhost registry + Kamal 2.11; v5.4.5 lacks registry setup).
      # Use full commit SHA — short refs are fetched as branch names and fail.
      - name: Checkout avcd-actions
        uses: actions/checkout@v4
        with:
          repository: Avocado-Technology/avcd-actions
          ref: 2e0e1b537f6f82ab5b3dc3195884348a800d4ca8
          path: avcd-actions
          token: ${{ secrets.GH_INFRA_TOKEN }}

      - name: Deploy Keycloak with Kamal
        uses: ./avcd-actions/kamal-deploy
        with:
          deploy_host: ${{ steps.infisical.outputs.deploy_host }}
          deploy_user: ${{ steps.infisical.outputs.deploy_user }}
          ssh_key: ${{ steps.infisical.outputs.ssh_key }}
          # Unused for login when deploy.yml registry.server is localhost; required by composite input.
          docr_registry_url: localhost:5555
          infisical_api_url: ${{ vars.INFISICAL_API_URL || 'https://secrets.avcd.ai/api' }}
          infisical_project_id: ${{ vars.INFISICAL_INFRA_PROJECT_ID }}
          infisical_oidc_identity_id: ${{ vars.INFISICAL_OIDC_IDENTITY_ID }}
          kamal_version: ${{ vars.KAMAL_VERSION || '2.11.0' }}
          kamal_command: ${{ github.event_name == 'workflow_dispatch' && inputs.kamal_command || 'deploy' }}
          # false: Kamal must build/push to localhost:5555 (--skip-push only when true).
          skip_registry_login: "false"
          skip_secrets_render: "true"
          keycloak_host: ${{ steps.infisical.outputs.keycloak_host }}
          skip_accessory_boot: "true"
          # Edge smoke: master realm always exists after Kamal deploy. avcd realm is provisioned
          # separately (terraform-keycloak / realm import), not by this workflow.
          verify_url: https://${{ steps.infisical.outputs.keycloak_host }}/realms/master/.well-known/openid-configuration
          verify_body_substring: https://${{ steps.infisical.outputs.keycloak_host }}/realms/master
