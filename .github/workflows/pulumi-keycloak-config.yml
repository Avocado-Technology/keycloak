# Apply realm avcd clients/scopes on auth.avcd.ai via keycloak-config-cli.
name: Keycloak Config

on:
  workflow_dispatch:
    inputs:
      push_secrets:
        description: Push client secrets to Infisical after apply
        required: false
        default: true
        type: boolean

concurrency:
  group: keycloak-config-cli
  cancel-in-progress: true

env:
  INFISICAL_API_URL: https://secrets.avcd.ai/api
  INFISICAL_ENV: prod
  INFISICAL_SECRET_PATH: /keycloak
  INFISICAL_INFRA_PROJECT_ID: db036f0e-7452-4e17-9573-e5471b45d65f
  KEYCLOAK_URL: https://auth.avcd.ai

permissions:
  contents: read

jobs:
  keycloak-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical jq
          infisical --version

      - name: Require repository secrets
        shell: bash
        run: |
          : "${{ secrets.INFISICAL_CLIENT_ID }}"
          : "${{ secrets.INFISICAL_CLIENT_SECRET }}"

      - name: Apply Keycloak realm (keycloak-config-cli)
        shell: bash
        run: bash scripts/apply-keycloak-config.sh
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}

      - name: Push client secrets to Infisical
        if: inputs.push_secrets != false
        shell: bash
        run: bash scripts/push-client-secrets-to-infisical.sh
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
