# Production: Keycloak on managed PostgreSQL (Terraform) + Traefik on avcd_edge.
# Secrets: .env.infisical (Infisical export in CI). Host: KEYCLOAK_HOST (e.g. auth.dev.avcd.ai).
# Deploy: compose_subdirectory=deploy/production (droplet-compose-deploy@v2).

name: avcd-keycloak

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: start --import-realm
    networks:
      - avcd_edge
    env_file:
      - path: .env.infisical
        required: true
    environment:
      KC_DB: postgres
      KC_DB_URL: ${KC_DB_URL:?set KC_DB_URL in .env.infisical}
      KC_DB_USERNAME: ${KC_DB_USERNAME:?set KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:?set KC_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOST:?set KEYCLOAK_HOST}
      KC_HOSTNAME_STRICT: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    volumes:
      - ../../config/avcd-realm.prod.json:/opt/keycloak/data/import/avcd-realm.json:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=avcd_edge
      - traefik.http.routers.avcd-keycloak.rule=Host(`${KEYCLOAK_HOST:?set KEYCLOAK_HOST}`)
      - traefik.http.routers.avcd-keycloak.entrypoints=websecure
      - traefik.http.routers.avcd-keycloak.tls=true
      - traefik.http.routers.avcd-keycloak.tls.certresolver=le
      - traefik.http.routers.avcd-keycloak.priority=100
      - traefik.http.routers.avcd-keycloak.service=avcd-keycloak
      - traefik.http.services.avcd-keycloak.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /realms/avcd/.well-known/openid-configuration HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 120s

networks:
  avcd_edge:
    external: true
