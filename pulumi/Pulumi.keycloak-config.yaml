config:
  avcd-keycloak:domain: avcd.ai
  avcd-keycloak:odooPublicHost: odoo.dev.avocado.tech
  avcd-keycloak:aiPublicHost: ai.dev.avocado.tech
  avcd-keycloak:frappePublicHost: dev.avocado.tech
  avcd-keycloak:contaAzulPublicHost: dev.avocado.tech
  avcd-keycloak:contaAzulPublicPath: /conta-azul-service
  avcd-keycloak:keycloakUrl: https://auth.avcd.ai
  avcd-keycloak:keycloakAdminUsername: admin
  # Set before preview/up (CI exports from Infisical /keycloak):
  #   bash scripts/set-keycloak-config-secrets.sh
  #   pulumi config set --secret keycloakAdminPassword <value> --stack keycloak-config
  avcd-keycloak:apiAudience: https://dev.avcd.ai/api
  avcd-keycloak:mcpPublicHost: dev.avocado.tech
  avcd-keycloak:mcpAudience: https://dev.avocado.tech/mcp
  avcd-keycloak:enableGoogleIdentityProvider: "true"
  avcd-keycloak:includeLocalhostGoogleRedirectUri: "true"
  # Optional Google OAuth (skip IdP when unset):
  # pulumi config set --secret googleClientId <id> --stack keycloak-config
  # pulumi config set --secret googleClientSecret <secret> --stack keycloak-config
