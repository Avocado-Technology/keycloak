# Kamal deploy — single Keycloak on infra (auth.avcd.ai); dev/prod apps use this URL.
# CI renders placeholders, builds via Dockerfile (FROM quay.io/keycloak/keycloak:26.0), pushes to localhost:5555 on the droplet.
# Secrets via Infisical OIDC (/keycloak in avcd-infra; INFISICAL_ENV prod = infra host slug).
# Docker health: Keycloak bash TCP probe on management port 9000 (see keycloak.org/observability/health).

service: avcd-keycloak
image: avcd/keycloak

# Kamal waits on Docker health; cold boot worst-case ~ start-period + retries×interval
deploy_timeout: 210

ssh:
  user: __DO_DEPLOY_USER__

servers:
  web:
    hosts:
      - __KEYCLOAK_DEPLOY_HOST__
    cmd: start
    proxy: false
    options:
      network: avcd_edge
      health-cmd: >-
        bash -c '{ printf "HEAD /health/ready HTTP/1.0\r\n\r\n" >&0;
        grep -q "HTTP/1.0 200"; } 0<>/dev/tcp/127.0.0.1/9000'
      health-interval: 10s
      health-retries: 12
      health-timeout: 5s
      health-start-period: 90s
    labels:
      traefik.enable: "true"
      traefik.docker.network: avcd_edge
      traefik.http.routers.avcd-keycloak.rule: Host(`__KEYCLOAK_HOST__`)
      traefik.http.routers.avcd-keycloak.entrypoints: websecure
      traefik.http.routers.avcd-keycloak.tls: "true"
      traefik.http.routers.avcd-keycloak.tls.certresolver: le
      traefik.http.routers.avcd-keycloak.priority: "100"
      traefik.http.routers.avcd-keycloak.service: avcd-keycloak
      traefik.http.services.avcd-keycloak.loadbalancer.server.port: "8080"
      # Claude MCP probes RFC 8414 path-insertion AS metadata before Keycloak's path-appending OIDC URL.
      traefik.http.middlewares.avcd-keycloak-oidc-discovery-path.replacepath.path: /realms/avcd/.well-known/openid-configuration
      traefik.http.routers.avcd-keycloak-oidc-discovery-path.rule: Host(`__KEYCLOAK_HOST__`) && Path(`/.well-known/openid-configuration/realms/avcd`)
      traefik.http.routers.avcd-keycloak-oidc-discovery-path.entrypoints: websecure
      traefik.http.routers.avcd-keycloak-oidc-discovery-path.tls: "true"
      traefik.http.routers.avcd-keycloak-oidc-discovery-path.tls.certresolver: le
      traefik.http.routers.avcd-keycloak-oidc-discovery-path.priority: "105"
      traefik.http.routers.avcd-keycloak-oidc-discovery-path.middlewares: avcd-keycloak-oidc-discovery-path
      traefik.http.routers.avcd-keycloak-oidc-discovery-path.service: avcd-keycloak
      traefik.http.middlewares.avcd-keycloak-oauth-as-discovery-path.replacepath.path: /realms/avcd/.well-known/openid-configuration
      traefik.http.routers.avcd-keycloak-oauth-as-discovery-path.rule: Host(`__KEYCLOAK_HOST__`) && Path(`/.well-known/oauth-authorization-server/realms/avcd`)
      traefik.http.routers.avcd-keycloak-oauth-as-discovery-path.entrypoints: websecure
      traefik.http.routers.avcd-keycloak-oauth-as-discovery-path.tls: "true"
      traefik.http.routers.avcd-keycloak-oauth-as-discovery-path.tls.certresolver: le
      traefik.http.routers.avcd-keycloak-oauth-as-discovery-path.priority: "105"
      traefik.http.routers.avcd-keycloak-oauth-as-discovery-path.middlewares: avcd-keycloak-oauth-as-discovery-path
      traefik.http.routers.avcd-keycloak-oauth-as-discovery-path.service: avcd-keycloak

# Local registry: Kamal skips remote docker login (see Kamal::Configuration::Registry#local?).
# CI runs kamal registry setup, builds from Dockerfile, pushes via SSH tunnel to the droplet.
registry:
  server: localhost:5555

# Required for pre-built images: selects amd64 variant on the server (no local build).
builder:
  arch: amd64

env:
  secret:
    - KC_DB_URL
    - KC_DB_USERNAME
    - KC_DB_PASSWORD
    - KEYCLOAK_ADMIN_PASSWORD
  clear:
    KC_DB: postgres
    KEYCLOAK_ADMIN: admin
    KC_HOSTNAME: __KEYCLOAK_HOST__
    KC_HOSTNAME_STRICT: "true"
    KC_PROXY_HEADERS: xforwarded
    KC_HTTP_ENABLED: "true"
    KC_HEALTH_ENABLED: "true"
